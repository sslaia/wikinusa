name: wikinusa
description: "An Android app for Wikipedia in local languages in Indonesia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  easy_localization: ^3.0.8
  flutter_html: ^3.0.0
  flutter_riverpod: ^3.3.1
  flutter_widget_from_html: ^0.17.1
  google_fonts: ^8.0.2
  html: ^0.15.6
  http: ^1.6.0
  shared_preferences: ^2.5.4
  share_plus: ^12.0.0
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - assets/translations/
    - assets/translations/en.json
    - assets/translations/id.json
    - assets/translations/nia.json
